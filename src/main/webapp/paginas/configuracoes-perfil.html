<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>configuracoes-perfil</title>
</head>
<body>
	<div class="configuracoes-perfil">
		<form>
			<div class="nome">
				<div>
					<label for="nome">Nome:</label>
				</div>
				<div>
					<input type="text" id="nome" name="nome">
				</div>
			</div>
			<div class="nome-de-usuario">
				<div>
					<label for="nome-de-usuario">Nome de usuário:</label>
				</div>
				<div>
					<input type="text" id="nome-de-usuario" name="nome-de-usuario">
				</div>
			</div>
			<div class="email">
				<div>
					<label for="email">Email:</label>
				</div>
				<div>
					<input type ="email" id="email" name="email">
				</div>
			</div>
			<div class="tipo-sanguineo">
				<div>
					<label for="tipo-sanguineo">Tipo sanguíneo:</label>
				</div>
				<div>
					<input type="text" id="tipo-sanguineo" name="tipo-sanguineo">
				</div>
			</div>
			<div class="data-de-nascimento">
				<div>
					<label for="data-de-nascimento">Data de nascimento:</label>
				</div>
				<div>
					<input type="date" id="data-de-nascimento" name="data-de-nascimento">
				</div>
			</div>
			<div class="telefone">
				<div>
					<label for="telefone">Telefone:</label>
				</div>
				<div>
					<input type="tel" id="telefone" name="telefone">
				</div>
			</div>
		</form>
	</div>
</body>
</html>
